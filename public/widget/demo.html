<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NATTES Widget — Live X Feed</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #ededed;
        min-height: 100vh;
        padding: 40px 24px;
      }
      h1 { font-size: 1.5rem; margin-bottom: 8px; }
      .subtitle { color: #888; margin-bottom: 8px; font-size: 0.9rem; }
      .badge {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.75rem;
        margin-bottom: 24px;
      }
      .badge.live { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; }
      .badge.unavailable { background: rgba(255,255,255,0.08); color: #aaa; }
      .post {
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03);
        padding: 20px;
        border-radius: 16px;
        margin-bottom: 16px;
        max-width: 600px;
      }
      .setup {
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.03);
        padding: 20px;
        border-radius: 16px;
        max-width: 600px;
        color: #aaa;
        font-size: 0.9rem;
        line-height: 1.6;
      }
      .setup a { color: #7dd3fc; }
      code {
        display: block;
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 12px;
        font-size: 0.8rem;
        margin-top: 24px;
        color: #7dd3fc;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>NATTES Widget — Live X Feed</h1>
    <p class="subtitle">Real posts from X with AI detection toggles.</p>
    <span id="status-badge" class="badge unavailable">Loading...</span>
    <div id="feed"></div>

    <script src="/widget/natte-widget.js"></script>
    <script>
      (function () {
        var feed = document.getElementById("feed");
        var badge = document.getElementById("status-badge");

        fetch("/api/widget/config")
          .then(function (res) { return res.json(); })
          .then(function (config) {
            var username = config.x.defaultUsername;
            return fetch("/api/x/posts?username=" + encodeURIComponent(username) + "&count=5")
              .then(function (res) { return res.json(); })
              .then(function (data) {
                if (data.source === "live" && data.posts && data.posts.length > 0) {
                  badge.textContent = "Live X feed · @" + data.username;
                  badge.className = "badge live";

                  data.posts.forEach(function (post) {
                    var card = document.createElement("div");
                    card.className = "post";
                    card.setAttribute("data-natte-text", post.text);

                    var text = document.createElement("p");
                    text.textContent = post.text;
                    text.style.lineHeight = "1.6";
                    text.style.marginBottom = "12px";
                    card.appendChild(text);

                    var widget = document.createElement("div");
                    widget.setAttribute("data-natte-widget", "");
                    card.appendChild(widget);

                    feed.appendChild(card);
                  });

                  if (window.NatteWidget) {
                    window.NatteWidget.init();
                  }
                  return;
                }

                badge.textContent = "Live feed unavailable";
                badge.className = "badge unavailable";
                feed.innerHTML =
                  '<div class="setup">' +
                  (data.message || "Could not load live X posts.") +
                  '<br><br>' +
                  '<a href="/dashboard">Connect X on your dashboard</a> or set <code style="display:inline;padding:2px 6px;">X_BEARER_TOKEN</code> in Vercel.' +
                  "</div>";
              });
          })
          .catch(function () {
            badge.textContent = "Live feed unavailable";
            feed.innerHTML =
              '<div class="setup">Failed to load widget config. <a href="/">Return home</a></div>';
          });
      })();
    </script>
  </body>
</html>
